name: Build & deploy website

on:
  push:
    branches: [main]
    paths:
      - '**.lock'
      - '**.nix'
      - 'docs/**'
      - 'pkgs/**'
      - 'CHANGELOG.md'

      - '.github/workflows/website.yml'
  pull_request:
    paths:
      - '**.lock'
      - '**.nix'
      - 'docs/**'
      - 'pkgs/**'
      - 'CHANGELOG.md'

      - '.github/workflows/website.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build site

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          # TODO: Remove when Nix 2.26 is released
          # https://hydra.nixos.org/eval/1811064
          nix-package-url: https://hydra.nixos.org/build/285626679/download/1/nix-2.26.0pre19700101_bcb92a5-x86_64-linux.tar.xz

      - name: Install Cachix
        uses: cachix/cachix-action@v15
        with:
          name: catppuccin
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run build
        run: |
          nix build \
            --print-build-logs \
            --show-trace \
            './dev#site'

      - name: Get artifact directory
        id: find-path
        run: |
          # exit if no `result` from `nix build`
          [ ! -L result ] && exit 1
          echo "path=$(readlink -f result)" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.find-path.outputs.path }}

  deploy:
    name: Deploy website

    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    permissions:
      id-token: write
      pages: write

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
